<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#1C1C1C"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <radialGradient id="glow" cx="42%" cy="62%" r="55%">
      <stop offset="0%"   stop-color="#C49A6C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C49A6C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo sólido (sin transparencia — imprescindible para Windows taskbar) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Halo atmosférico -->
  <circle cx="210" cy="316" r="230" fill="url(#glow)"/>

  <!-- Corona / sol — ámbar sólido -->
  <circle cx="210" cy="316" r="192" fill="#D4A96A"/>

  <!-- Cuerpo eclipse — mismo color que fondo, crea el crescent -->
  <circle cx="306" cy="212" r="180" fill="#111111"/>

  <!-- Rim luminoso (borde corona) -->
  <circle cx="210" cy="316" r="192"
    fill="none" stroke="#FFF8EE" stroke-width="7" opacity="0.50"/>

  <!-- Borde sutil del eclipse (profundidad) -->
  <circle cx="306" cy="212" r="180"
    fill="none" stroke="#2C2C2C" stroke-width="4" opacity="0.80"/>
</svg>
